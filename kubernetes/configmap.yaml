apiVersion: v1
kind: ConfigMap
metadata:
  name: swarm-inference-config
  namespace: swarm-inference
  labels:
    app: swarm-inference
data:
  config.yaml: |
    # Swarm Inference Configuration for Kubernetes
    network:
      listen_addr: "0.0.0.0:8080"
      coordinator_addr: "swarm-coordinator.swarm-inference.svc.cluster.local:8080"
      connection_timeout_secs: 30
      max_message_size: 10485760
      cert_validity_days: 365

    performance:
      worker_threads: null
      max_memory_mb: null
      kv_cache_sync_interval_ms: 100
      erasure_redundancy: 2
      consensus_timeout_secs: 10

    compute:
      preferred_gpu: null
      enable_cuda: false
      max_concurrent_gpu_ops: 4
      gpu_memory_pool_mb: 1024

    monitoring:
      enable_metrics: true
      metrics_interval_secs: 30
      dashboard_addr: "0.0.0.0:9090"
      enable_tracing: true
      tracing_level: "info"
      alert_thresholds:
        max_latency_ms: 1000
        error_rate_threshold: 5.0
        memory_usage_threshold: 90.0

    security:
      enable_tls: true
      cert_file: null
      key_file: null
      auth_token: null

    kubernetes:
      enabled: true
      namespace: "swarm-inference"
      service_account: "swarm-inference-sa"
      node_selector: {}
      tolerations: []
      affinity: null

    auto_scaling:
      enabled: true
      min_nodes: 3
      max_nodes: 10
      target_queue_depth: 5.0
      max_latency_seconds: 2.0
      cpu_scale_up_threshold: 70.0
      cpu_scale_down_threshold: 30.0
      memory_threshold: 80.0
      scale_cooldown_seconds: 300
      metrics_history_size: 60
      scaling_sensitivity: 0.7
      predictive_scaling: true
      predictive_window_seconds: 600