apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: swarm-nodes-pdb
  namespace: swarm-inference
  labels:
    app: swarm-inference
    component: node
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: swarm-inference
      component: node

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: swarm-coordinator-pdb
  namespace: swarm-inference
  labels:
    app: swarm-inference
    component: coordinator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: swarm-inference
      component: coordinator