apiVersion: v1
kind: Service
metadata:
  name: swarm-coordinator
  namespace: swarm-inference
  labels:
    app: swarm-inference
    component: coordinator
spec:
  selector:
    app: swarm-inference
    component: coordinator
  ports:
  - name: coordinator
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: swarm-nodes
  namespace: swarm-inference
  labels:
    app: swarm-inference
    component: node
spec:
  selector:
    app: swarm-inference
    component: node
  ports:
  - name: node
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: swarm-dashboard
  namespace: swarm-inference
  labels:
    app: swarm-inference
    component: dashboard
spec:
  selector:
    app: swarm-inference
    component: dashboard
  ports:
  - name: dashboard
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP