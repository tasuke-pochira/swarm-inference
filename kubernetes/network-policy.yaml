apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: swarm-inference-network-policy
  namespace: swarm-inference
  labels:
    app: swarm-inference
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: swarm-inference
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx  # Allow ingress controller
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: swarm-inference
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  - to: []  # Allow DNS resolution
    ports:
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 443  # Allow API server communication